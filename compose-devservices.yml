services:
  postgresql:
    image: postgres:18.3
    environment:
      POSTGRES_DB: snello
      POSTGRES_USER: snello
      POSTGRES_PASSWORD: snello
    ports:
      - "5432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U snello -d snello
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
      - --hostname-strict=false
    ports:
      - "8180:8080"
    volumes:
      - ./dev/keycloak:/opt/keycloak/data/import:ro

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minio minio123; do
          echo "Waiting for MinIO..."
          sleep 2
        done
        mc mb -p local/snello || true
        mc anonymous set none local/snello || true
        exit 0