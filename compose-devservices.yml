services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: snello
      MYSQL_USER: snello
      MYSQL_PASSWORD: snello
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - localhost
        - -uroot
        - -proot
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
      - --hostname-strict=false
    ports:
      - "8180:8080"
    volumes:
      - ./dev/keycloak:/opt/keycloak/data/import:ro

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minio minio123; do
          echo "Waiting for MinIO..."
          sleep 2
        done
        mc mb -p local/snello || true
        mc anonymous set none local/snello || true
        exit 0